<!DOCTYPE html>
<html lang="ne" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अधिराज Story</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="google" content="notranslate">
    <link rel="apple-touch-icon" href="new-logo.png">
    <style>
        /* लोडिङ स्क्रिनको प्रिमियम र सफा डिजाइन */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-content { text-align: center; }
        .progress-container {
            width: 200px; height: 4px;
            background: #444;
            margin: 20px auto 0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #d32f2f;
            animation: load 2s linear forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body class="day-mode">

    <div id="loadingScreen">
        <div class="loading-content">
            <h1 style="color: white; font-family: 'Georgia', serif; font-weight: 900; letter-spacing: 1px;">Aadhiraj Story</h1>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // १. Service Worker Register गर्ने (PWA को लागि अनिवार्य)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered Successfully!'))
                    .catch(err => console.log('Service Worker Registration Failed:', err));
            });
        }

        // २. लोडिङ स्क्रिन र Redirection
        window.onload = () => {
            setTimeout(() => {
                const ls = document.getElementById('loadingScreen');
                if (ls) {
                    ls.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = "home.html";
                    }, 400);
                }
            }, 2000);
        };
    </script>
</body>
</html>
