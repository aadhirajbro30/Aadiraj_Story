<!DOCTYPE html>
<html lang="ne" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>कथा पढ्नुहोस्</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Mukta', sans-serif; line-height: 1.9; color: #333; background: #fcfbf7; padding: 75px 20px 60px; transition: 0.3s; user-select: none; }
        .toolbar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(252, 251, 247, 0.95); border-bottom: 1px solid #ddd; z-index: 1000; height: 45px; }
        .btn { text-decoration: none; color: #333; border: 1px solid #ccc; padding: 6px 15px; border-radius: 5px; font-weight: bold; background: #fff; cursor: pointer; }
        .bold-feeling { max-width: 600px; margin: 0 auto; }
        .bold-feeling p { font-size: 22px; margin-bottom: 25px; font-weight: 900; text-align: justify; padding: 8px; border-radius: 6px; cursor: pointer; scroll-margin-top: 140px; }
        .bold-feeling p.highlighted { background-color: rgba(255, 235, 59, 0.6) !important; color: #000 !important; }
        
        /* अडियो बार */
        .audio-container { max-width: 280px; margin: 0 auto; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .audio-container.open { max-height: 100px; opacity: 1; margin: 15px auto 20px; }
        .audio-bar { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #ddd; padding: 8px 14px; border-radius: 25px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .audio-play-btn { background: #5D4037; color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 14px; cursor: pointer; flex-shrink: 0; }
        .audio-progress { width: 100%; height: 5px; appearance: none; background: #e0e0e0; border-radius: 3px; outline: none; }
        .audio-progress::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #5D4037; }
        
        .quote-box { background-color: #f5f3e9; border-left: 5px solid #5D4037; padding: 18px; margin: 25px 0; font-style: italic; border-radius: 0 8px 8px 0; }
        .main-title { font-size: 30px; font-weight: 800; display: block; margin-top: 10px; color: #5D4037; text-align: center; }
        .straight-line { width: 100%; max-width: 600px; height: 1px; background: #ddd; border: none; margin: 20px auto 15px; }
        .diary-image { width: 100%; max-width: 500px; aspect-ratio: 4 / 5; object-fit: cover; display: none; margin: 0 auto 30px; border-radius: 12px; }
        
        .story-footer { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ddd; text-align: center; }
        .footer-author { font-size: 21px; font-weight: 800; text-align: left; margin-bottom: 15px; }
        .footer-moral { font-size: 28px; font-weight: 800; display: block; margin-bottom: 12px; }
        
        .bottom-action-container { position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; align-items: center; z-index: 2000; transition: bottom 0.4s ease; }
        .bottom-action-container.show { bottom: 25px; }
        .pencil-btn { width: 52px; height: 52px; border-radius: 50%; background: #5D4037; color: #fff; font-size: 22px; border: none; cursor: pointer; }
        .pencil-btn.active { background: #2e7d32; }
        .action-row { display: flex; width: 100%; gap: 10px; }
        .clear-btn, .jump-btn { flex: 1; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; display: none; }
        .clear-btn { background: #c62828; color: white; }
        .jump-btn { background: #d84315; color: white; }

        .toast-notification { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #323232; color: #fff; padding: 10px 20px; border-radius: 25px; z-index: 3000; transition: bottom 0.3s; }
        .toast-notification.show { bottom: 100px; }

        .dark-mode { background-color: #121212; color: #e0e0e0; }
        .dark-mode .toolbar { background: rgba(18, 18, 18, 0.95); border-color: #333; }
        .dark-mode .btn { background: #1e1e1e; border-color: #333; color: #e0e0e0; }
        .dark-mode .audio-bar { background: #1e1e1e; border-color: #333; }
        .dark-mode .quote-box { background-color: #222; border-left-color: #ffc107; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="toolbar">
        <a href="home.html" class="btn">← back</a>
        <button class="btn" onclick="toggleNightMode()" id="nightBtn">🌙 | नाइट मोड</button>
    </div>

    <div id="toastBox" class="toast-notification"></div>

    <div class="bottom-action-container" id="actionContainer">
        <button class="pencil-btn" id="pencilBtn" onclick="toggleHighlightMode()">✏️</button>
        <div class="action-row">
            <button class="clear-btn" id="clearBtn" onclick="clearBookmark()">🗑️ Clear</button>
            <button class="jump-btn" id="jumpBtn" onclick="jumpToBookmark()">📍 Continue</button>
        </div>
    </div>

    <div class="bold-feeling">
        <span class="main-title" id="storyTitle">लोड हुँदैछ...</span>
        <hr class="straight-line">
        
        <!-- अडियो बार -->
        <div class="audio-container" id="audioContainer">
            <div class="audio-bar">
                <button class="audio-play-btn" id="audioPlayBtn" onclick="togglePlayAudio()">▶</button>
                <div class="audio-progress-wrapper" style="flex-grow: 1;">
                    <input type="range" class="audio-progress" id="audioSeekBar" value="0" min="0" max="100" oninput="seekAudio(this.value)">
                </div>
            </div>
            <audio id="storyAudio"></audio>
        </div>

        <img src="" alt="Story Image" class="diary-image" id="storyImage">
        <div id="storyContainer"></div>
    </div>

    <!-- JS फाइल लिंक गरिएको -->
    <script src="NepaliStory.js"></script>

    <script>
        function toggleNightMode() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('nightBtn').innerHTML = document.body.classList.contains('dark-mode') ? "☀️ डे मोड" : "🌙 नाइट मोड";
        }

        function showToast(msg) {
            const toast = document.getElementById('toastBox');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        let isHighlightMode = false, storyKey = "";

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            storyKey = urlParams.get('id') || "";

            if (storyKey && typeof nepaliStories !== 'undefined' && nepaliStories[storyKey]) {
                const story = nepaliStories[storyKey];
                document.getElementById('storyTitle').innerText = story.title;
                
                if (story.image) {
                    const img = document.getElementById('storyImage');
                    img.src = story.image;
                    img.style.display = 'block';
                }
                if (story.audio) document.getElementById('storyAudio').src = story.audio;

                const container = document.getElementById('storyContainer');
                story.paragraphs.forEach((para, index) => {
                    const p = document.createElement('p');
                    p.setAttribute('data-id', 'p_' + (index + 1));
                    p.innerHTML = para;
                    container.appendChild(p);
                });

                if (story.author || story.moral) {
                    const footer = document.createElement('div');
                    footer.className = 'story-footer';
                    footer.innerHTML = `
                        <div class="footer-author"><strong>| लेखक:-</strong> ${story.author || 'अधिराज सुनार'}</div>
                        <span class="footer-moral" style="color: ${story.moralColor || '#333'}">${story.moral || ''}</span>
                        <div>♡ Thanks For Reading ♡</div>
                    `;
                    container.appendChild(footer);
                }
            } else {
                document.getElementById('storyTitle').innerText = "कथा भेटिएन";
            }

            loadSavedBookmark();
            setupInteractions();
            setupAudioEvents();
        });

        // Triple Tap (अडियो बार खोल्न) र Double Tap (मेनु खोल्न)
        let tapCount = 0, tapTimer = null;
        window.addEventListener('click', (e) => {
            if (e.target.closest('#actionContainer') || e.target.closest('.toolbar') || e.target.closest('#audioContainer')) return;
            tapCount++;
            if (tapCount === 1) {
                tapTimer = setTimeout(() => { tapCount = 0; }, 400);
            } else if (tapCount === 2) {
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    document.getElementById('actionContainer').classList.toggle('show');
                    tapCount = 0;
                }, 300);
            } else if (tapCount === 3) {
                clearTimeout(tapTimer);
                tapCount = 0;
                const ac = document.getElementById('audioContainer');
                const isOpen = ac.classList.toggle('open');
                showToast(isOpen ? "अडियो बार खुल्यो" : "अडियो बार बन्द भयो");
            }
        });

        function togglePlayAudio() {
            const audio = document.getElementById('storyAudio');
            const btn = document.getElementById('audioPlayBtn');
            if (!audio.src || audio.src === window.location.href) return showToast("अडियो उपलब्ध छैन");
            if (audio.paused) { audio.play(); btn.innerText = "❚❚"; }
            else { audio.pause(); btn.innerText = "▶"; }
        }

        function setupAudioEvents() {
            const audio = document.getElementById('storyAudio');
            const seek = document.getElementById('audioSeekBar');
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) seek.value = (audio.currentTime / audio.duration) * 100;
            });
            audio.addEventListener('ended', () => {
                document.getElementById('audioPlayBtn').innerText = "▶";
                seek.value = 0;
            });
        }

        function seekAudio(val) {
            const audio = document.getElementById('storyAudio');
            if (audio.duration) audio.currentTime = (val / 100) * audio.duration;
        }

        function toggleHighlightMode() {
            isHighlightMode = !isHighlightMode;
            document.getElementById('pencilBtn').classList.toggle('active');
            if (isHighlightMode) showToast("बुकमार्क मोड अन। प्याराग्राफ थिच्नुहोस्।");
        }

        function setupInteractions() {
            document.querySelectorAll('#storyContainer p').forEach(p => {
                let timer;
                const start = () => { if(isHighlightMode) timer = setTimeout(() => saveBookmark(p), 800); };
                const cancel = () => clearTimeout(timer);
                p.addEventListener('touchstart', start, {passive: true});
                p.addEventListener('mousedown', start);
                p.addEventListener('touchend', cancel);
                p.addEventListener('mouseup', cancel);
            });
        }

        function saveBookmark(p) {
            localStorage.setItem('bookmark_' + storyKey, p.getAttribute('data-id'));
            isHighlightMode = false;
            document.getElementById('pencilBtn').classList.remove('active');
            loadSavedBookmark();
            showToast("बुकमार्क सुरक्षित भयो!");
        }

        function loadSavedBookmark() {
            const id = localStorage.getItem('bookmark_' + storyKey);
            document.querySelectorAll('#storyContainer p').forEach(p => p.classList.toggle('highlighted', p.getAttribute('data-id') === id));
            document.getElementById('jumpBtn').style.display = id ? 'block' : 'none';
            document.getElementById('clearBtn').style.display = id ? 'block' : 'none';
        }

        function jumpToBookmark() {
            const id = localStorage.getItem('bookmark_' + storyKey);
            document.querySelector(`p[data-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function clearBookmark() {
            localStorage.removeItem('bookmark_' + storyKey);
            loadSavedBookmark();
            showToast("बुकमार्क हटाइयो!");
        }
    </script>
</body>
</html>
